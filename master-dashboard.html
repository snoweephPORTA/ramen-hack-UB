<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RH ALL</title>
<meta name="theme-color" content="#C0392B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RH ALL">
<link rel="manifest" href="manifest-master.json">
<link rel="icon" type="image/png" href="icon-dash-192.png">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red-mid:#d44;--red-light:#fdecea;
  --yellow:#E8B84B;--yellow2:#FFF8E7;
  --dark:#1A1A1A;--dark2:#2d2d2d;
  --green:#16a34a;--green2:#dcfce7;
  --blue:#1d4ed8;--blue2:#dbeafe;
  --orange:#ea580c;--orange2:#fff7ed;
  --white:#fff;--off:#FFF8F0;--light:#F0E0D8;--gray:#9a8080;
  --navy:#1B3A6B;--navy-mid:#234a87;
  --shadow:0 4px 18px rgba(192,57,43,.10);--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--off);color:var(--dark);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.topnav{background:var(--red);border-bottom:3px solid var(--yellow);padding:0 14px;height:55px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Black Han Sans',sans-serif;color:var(--yellow);font-size:18px;}
.logo span{color:#fff;}
.nav-right{display:flex;align-items:center;gap:8px;}
.refresh-btn{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:8px;color:var(--yellow);font-size:11px;font-weight:800;padding:5px 10px;cursor:pointer;}
.sound-btn{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:8px;font-size:13px;padding:4px 9px;cursor:pointer;}
.sound-btn.off{opacity:.45;}
.live-dot{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:800;color:rgba(255,255,255,.6);}
.live-dot .dot{width:7px;height:7px;border-radius:50%;background:#888;}
.live-dot.on .dot{background:#4ade80;animation:livepulse 2s infinite;}
.live-dot.on{color:#4ade80;}
@keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.last-update{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);}
.tabbar{background:var(--red);border-bottom:2px solid rgba(255,215,0,.2);display:flex;padding:0 8px 10px;gap:4px;flex-shrink:0;}
.tabbtn{flex:1;background:rgba(255,255,255,.08);border:2px solid rgba(255,215,0,.2);border-radius:10px;color:rgba(255,255,255,.6);font-family:'Black Han Sans',sans-serif;font-size:9px;padding:7px 2px;cursor:pointer;text-align:center;}
.tabbtn.active{background:var(--yellow);border-color:var(--yellow);color:var(--dark);}
.branchbar{background:var(--dark);display:flex;padding:7px 8px;gap:5px;flex-shrink:0;border-bottom:2px solid var(--yellow);}
.branchpill{flex:1;background:rgba(255,255,255,.08);border:1.5px solid rgba(232,184,75,.3);border-radius:8px;color:rgba(255,255,255,.7);font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;padding:6px 2px;cursor:pointer;text-align:center;}
.branchpill.active{background:var(--yellow);border-color:var(--yellow);color:var(--dark);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:flex;flex-direction:column;gap:10px;}
.tab-panel{display:none;flex-direction:column;gap:10px;}
.tab-panel.active{display:flex;}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:2px solid var(--light);overflow:hidden;}
.card-hd{background:var(--red);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--yellow);}
.card-sub{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);}
.card-body{padding:12px 14px;}
.big-stat{text-align:center;padding:14px 12px;}
.big-num{font-family:'Black Han Sans',sans-serif;font-size:40px;color:var(--dark);line-height:1;}
.big-lbl{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;margin-top:4px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;}
.stat-item{text-align:center;background:var(--off);border-radius:8px;padding:8px 4px;}
.stat-num{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--dark);}
.stat-lbl{font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;}
.pay-row{display:flex;padding:10px 14px;gap:8px;}
.pay-item{flex:1;text-align:center;background:var(--off);border-radius:8px;padding:8px 4px;}
.pay-num{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--dark);}
.pay-lbl{font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;}
.bar-chart{padding:10px 14px 6px;}
.bars{display:flex;align-items:flex-end;gap:2px;height:60px;}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;}
.bar-fill{border-radius:3px 3px 0 0;width:100%;min-height:2px;}
.bar-lbl{font-size:7px;font-weight:800;color:var(--gray);}
.bar-val{font-size:6px;font-weight:900;color:var(--navy-mid);}
.week-bars{display:flex;align-items:flex-end;gap:3px;height:80px;}
.week-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;}
.week-fill{border-radius:4px 4px 0 0;width:100%;min-height:2px;}
.week-lbl{font-size:7px;font-weight:800;color:var(--gray);}
.week-val{font-size:6px;font-weight:900;color:var(--navy-mid);}
.week-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 14px;}
.ws{background:var(--off);border-radius:8px;padding:8px 6px;text-align:center;}
.ws-num{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--dark);}
.ws-lbl{font-size:8px;font-weight:800;color:var(--gray);text-transform:uppercase;}
.peak-boxes{display:flex;gap:6px;margin-bottom:10px;}
.peak-box{flex:1;border-radius:8px;padding:8px 6px;text-align:center;}
.peak-box.hot{background:var(--yellow2);border:2px solid var(--yellow);}
.peak-box.cold{background:var(--off);border:2px solid var(--light);}
.peak-box-time{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--dark);}
.peak-box-val{font-size:9px;font-weight:800;color:var(--gray);}
.peak-label{font-size:10px;font-weight:800;margin-bottom:6px;}
.rank-list{display:flex;flex-direction:column;}
.rank-item{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--light);gap:8px;}
.rank-item:last-child{border-bottom:none;}
.rnum{font-family:'Black Han Sans',sans-serif;font-size:12px;width:22px;text-align:center;flex-shrink:0;}
.rn1{color:var(--yellow);}
.rn2{color:#C0C0C0;}
.rn3{color:#CD7F32;}
.rnn{color:var(--gray);}
.rank-info{flex:1;min-width:0;}
.rank-name{font-weight:800;font-size:11px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-cat{font-size:9px;font-weight:700;color:var(--gray);}
.rank-bar-wrap{background:var(--light);border-radius:3px;height:3px;margin-top:3px;}
.rank-bar-fill{background:var(--yellow);border-radius:3px;height:3px;}
.rank-right{text-align:right;flex-shrink:0;}
.rank-qty{font-family:'Black Han Sans',sans-serif;font-size:12px;color:var(--dark);}
.rank-rev{font-size:9px;font-weight:700;color:var(--gray);}
.date-row{background:var(--white);border-radius:9px;padding:8px 12px;border:2px solid var(--light);display:flex;align-items:center;gap:8px;}
.date-in{background:var(--light);border:2px solid rgba(27,58,107,.2);border-radius:8px;padding:5px 7px;font-weight:800;font-size:11px;color:var(--dark);outline:none;flex:1;}
.today-btn{background:var(--yellow);border:none;border-radius:7px;font-weight:900;font-size:10px;padding:6px 10px;cursor:pointer;color:var(--dark);white-space:nowrap;}
.filter-row{display:flex;gap:6px;}
.fpill{flex:1;background:var(--white);border:2px solid var(--light);border-radius:20px;font-weight:800;font-size:10px;color:var(--gray);padding:6px 4px;cursor:pointer;text-align:center;}
.fpill.active{background:var(--red);border-color:var(--red);color:var(--yellow);}
.history-item{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--light);gap:10px;}
.history-item:last-child{border-bottom:none;}
.hist-date{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--dark);min-width:72px;}
.hist-rev{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--dark);}
.hist-sub{font-size:10px;font-weight:700;color:var(--gray);}
.cat-item{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--light);gap:8px;}
.cat-item:last-child{border-bottom:none;}
.cat-info{flex:1;min-width:0;}
.cat-name{font-weight:800;font-size:11px;color:var(--dark);}
.cat-bar-wrap{background:var(--light);border-radius:3px;height:4px;margin-top:3px;}
.cat-bar-fill{border-radius:3px;height:4px;}
.cat-right{text-align:right;flex-shrink:0;}
.cat-qty{font-size:10px;font-weight:800;color:var(--gray);}
.cat-rev{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--dark);}
.hl-row{display:flex;justify-content:space-between;align-items:center;background:var(--off);padding:8px 10px;border-radius:8px;margin-bottom:6px;}
.hl-lbl{font-size:10px;font-weight:800;text-transform:uppercase;}
.hl-val{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--dark);}
.insight-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--light);align-items:flex-start;}
.insight-item:last-child{border-bottom:none;}
.insight-icon{font-size:20px;flex-shrink:0;margin-top:2px;}
.insight-text{flex:1;}
.insight-title{font-weight:900;font-size:12px;color:var(--dark);}
.insight-desc{font-size:11px;font-weight:700;color:var(--gray);margin-top:2px;line-height:1.4;}
.insight-badge{display:inline-block;border-radius:6px;font-size:9px;font-weight:900;padding:2px 7px;margin-top:4px;}
.badge-green{background:#dcfce7;color:#16a34a;}
.badge-yellow{background:var(--yellow2);color:#92400e;}
.badge-red{background:#fee2e2;color:#dc2626;}
.badge-blue{background:#dbeafe;color:#1d4ed8;}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;}
.matrix-cell{border-radius:10px;padding:10px;border:2px solid;}
.matrix-cell.star{background:#fffbeb;border-color:var(--yellow);}
.matrix-cell.workhorse{background:#f0fdf4;border-color:#86efac;}
.matrix-cell.sleeper{background:#eff6ff;border-color:#93c5fd;}
.matrix-cell.deadweight{background:#fef2f2;border-color:#fca5a5;}
.matrix-label{font-family:'Black Han Sans',sans-serif;font-size:11px;margin-bottom:4px;}
.matrix-items{font-size:9px;font-weight:700;color:var(--gray);line-height:1.5;}
.dow-row{display:flex;gap:4px;padding:10px 14px;}
.dow-cell{flex:1;text-align:center;border-radius:8px;padding:8px 3px;}
.dow-day{font-size:8px;font-weight:800;color:var(--gray);margin-bottom:3px;}
.dow-val{font-family:'Black Han Sans',sans-serif;font-size:10px;}
.pie-wrap{display:flex;flex-direction:column;align-items:center;padding:14px;}
.pie-svg{width:160px;height:160px;}
.pie-legend{display:flex;flex-direction:column;gap:5px;width:100%;padding:0 14px 10px;}
.pie-leg-item{display:flex;align-items:center;gap:8px;}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pie-leg-name{font-size:10px;font-weight:800;color:var(--dark);flex:1;}
.pie-leg-pct{font-size:10px;font-weight:900;color:var(--gray);}
.pie-leg-rev{font-size:10px;font-weight:700;color:var(--gray);}
.trend-wrap{padding:10px 14px 6px;}
.trend-svg{width:100%;height:70px;}
.order-log-item{display:flex;flex-direction:column;padding:10px 14px;border-bottom:1px solid var(--light);gap:3px;}
.order-log-item:last-child{border-bottom:none;}
.order-log-top{display:flex;align-items:center;gap:8px;}
.order-log-num{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--dark);min-width:40px;}
.order-log-cust{font-size:11px;font-weight:800;color:var(--gray);flex:1;}
.order-log-pay{font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;}
.pay-cash{background:#dcfce7;color:#15803d;}
.pay-gcash{background:#dbeafe;color:#1d4ed8;}
.order-log-total{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--dark);}
.order-log-items{font-size:11px;font-weight:700;color:var(--gray);line-height:1.5;}
.order-log-time{font-size:10px;font-weight:700;color:var(--gray);}
.empty{text-align:center;padding:30px 20px;color:var(--gray);font-weight:700;font-size:13px;}
.loading{text-align:center;padding:40px;color:var(--gray);}
.spinner{width:32px;height:32px;border:3px solid var(--light);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--red);color:var(--yellow);font-weight:900;font-size:12px;padding:8px 16px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s;z-index:500;white-space:nowrap;border:2px solid var(--yellow);}
.toast.show{opacity:1;}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, query, orderByChild, startAt, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Each branch has its own Firebase project. Add a branch here to wire its
// live feed into the master dashboard. (Abanao: fill in when built.)
const BRANCH_FIREBASE = {
  UB: {
    apiKey: "AIzaSyDQsm8Y4e7DIw99IDa8Mcckw54T87P_haw",
    authDomain: "ramen-hack-ub.firebaseapp.com",
    projectId: "ramen-hack-ub",
    storageBucket: "ramen-hack-ub.firebasestorage.app",
    messagingSenderId: "246190930849",
    appId: "1:246190930849:web:29110b92bd94c3317769e0",
    databaseURL: "https://ramen-hack-ub-default-rtdb.firebaseio.com"
  },
  Porta: {
    apiKey: "AIzaSyBMgxV_evhc0AULIiJrVikP0azy4IAqHqw",
    authDomain: "ramen-hack-porta.firebaseapp.com",
    projectId: "ramen-hack-porta",
    storageBucket: "ramen-hack-porta.firebasestorage.app",
    messagingSenderId: "206966143795",
    appId: "1:206966143795:web:08239b8f5d82999ef55c46",
    databaseURL: "https://ramen-hack-porta-default-rtdb.asia-southeast1.firebasedatabase.app"
  }
  ,Abanao: {
    apiKey: "AIzaSyAJbw__jF1_l-DcURuPNk-iU1T6H8jei_A",
    authDomain: "ramen-hack-abanao.firebaseapp.com",
    projectId: "ramen-hack-abanao",
    storageBucket: "ramen-hack-abanao.firebasestorage.app",
    messagingSenderId: "640487167141",
    appId: "1:640487167141:web:97a124ea634522992ca94c",
    databaseURL: "https://ramen-hack-abanao-default-rtdb.asia-southeast1.firebasedatabase.app"
  }
};

// Per-branch live rows, merged for the dashboard
window._liveByBranch = {};            // { UB:[rows], Porta:[rows] }
let _connectedCount = 0, _totalBranches = 0;

function _wireBranch(branchName, cfg){
  // Skip branches not yet configured (placeholder values)
  if (String(cfg.databaseURL).indexOf('FILL_') === 0) return;
  _totalBranches++;
  let appInstance;
  try { appInstance = initializeApp(cfg, branchName); }
  catch(e){ console.log('[FB] init failed for '+branchName, e); return; }
  const db = getDatabase(appInstance);
  const auth = getAuth(appInstance);
  let authed = false;
  function signIn(){ signInAnonymously(auth).catch(function(e){ console.log('[FB] '+branchName+' auth retry 5s:', e.code); setTimeout(signIn,5000); }); }
  signIn();
  onAuthStateChanged(auth, function(user){
    if (user && !authed){ authed = true; startListening(); }
  });
  function startListening(){
    onValue(ref(db,'.info/connected'), snap=>{
      if (snap.val()) _connectedCount++; else if(_connectedCount>0) _connectedCount--;
      const dot=document.getElementById('live-dot');
      if(dot) dot.classList.toggle('on', _connectedCount>0);
    });
    const mid=new Date(); mid.setHours(0,0,0,0);
    const q=query(ref(db,'orders'), orderByChild('timestamp'), startAt(mid.getTime()));
    onValue(q, snap=>{
      const data=snap.val()||{};
      if(window._onLiveBranchOrders) window._onLiveBranchOrders(branchName, Object.values(data));
    });
  }
}

Object.keys(BRANCH_FIREBASE).forEach(function(b){ _wireBranch(b, BRANCH_FIREBASE[b]); });
</script>

<script>
const DATA_URL='https://snoweephporta.github.io/ramen-hack-UB/data.json';
const PIE_COLORS=['#E8B84B','#C0392B','#16a34a','#1d4ed8','#ea580c','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f59e0b'];
const fmt=n=>Number(n).toLocaleString('en-PH');
const fmtK=n=>n>=1000?'₱'+(n/1000).toFixed(1)+'k':'₱'+fmt(Math.round(n));
function fixDate(d){
  if(!d) return '';
  const s = String(d).trim();
  // Already ISO format
  if(s.match(/^\d{4}-\d{2}-\d{2}/)) return s.substring(0,10);
  // Try parsing as date
  try {
    const dt = new Date(s);

function getHour(t){if(!t)return-1;const s=String(t).trim();if(s.includes('T'))return parseInt(s.split('T')[1].split(':')[0]);if(s.match(/^\d{1,2}:\d{2}/))return parseInt(s.split(':')[0]);return-1;}function getHourFromRow(r){

// Better: use Web Audio API with a simple pleasant ding
let _audioCtx=null;
function getCtx(){
  if(!_audioCtx)_audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended')_audioCtx.resume();
  return _audioCtx;
}
// Unlock audio on first user interaction (required for iOS)
let _audioUnlocked=false;
function _unlockAudio(){
  if(_audioUnlocked)return;
  try{
    const ctx=getCtx();
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);
    src.start(0);
    _audioUnlocked=true;
  }catch(e){}
}
document.addEventListener('click',_unlockAudio,{passive:true});
document.addEventListener('touchstart',_unlockAudio,{passive:true});

function playChime(){
  if(!soundOn)return;
  _unlockAudio();
  try{
    const ctx=getCtx();
    const t=ctx.currentTime;
    // Ding 1
    function ding(time, freq){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(freq,time);
      o.frequency.exponentialRampToValueAtTime(freq*0.7,time+0.4);
      g.gain.setValueAtTime(0.6,time);
      g.gain.exponentialRampToValueAtTime(0.001,time+0.5);
      o.start(time);o.stop(time+0.5);
      // Overtone
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.connect(g2);g2.connect(ctx.destination);
      o2.type='sine';
      o2.frequency.setValueAtTime(freq*2,time);
      g2.gain.setValueAtTime(0.2,time);
      g2.gain.exponentialRampToValueAtTime(0.001,time+0.3);
      o2.start(time);o2.stop(time+0.3);
    }
    ding(t, 1047);      // C6
    ding(t+0.25, 1319); // E6
    ding(t+0.5, 1568);  // G6
  }catch(e){console.log('Sound error:',e);}
}
// Convert a Firebase order into data.json-style rows (one per item)
function fbOrderToRows(o){
  const d=new Date(o.timestamp||Date.now());
  const dateStr=localISO(d);
  const timeStr=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  const pay=(o.payment==='gcash'||o.payment==='GCash')?'GCash':'Cash';
  const items=Array.isArray(o.items)?o.items:Object.values(o.items||{});
  if(!items.length)return[{date:dateStr,txn:o.txnId||String(o.timestamp),orderNum:'#'+(o.orderNum||''),customer:o.customer||'',payment:pay,time:timeStr,order_total:o.total||0,item:'',qty:0,subtotal:0,category:''}];
  return items.map(function(it,idx){
    return{
      date:dateStr,
      txn:o.txnId||String(o.timestamp),
      orderNum:'#'+(o.orderNum||''),
      customer:o.customer||'',
      payment:pay,
      time:timeStr,
      order_total:idx===0?(o.total||0):(o.total||0),
      item:it.name||'',
      qty:it.qty||1,
      subtotal:(it.price||0)*(it.qty||1),
      category:it.cat||''
    };
  });
}
window._onLiveBranchOrders=function(branchName, fbOrders){
  // New-order chime: detect txnIds not seen before (skip first snapshot)
  if(!_firstSnap){
    let newCount=0;
    fbOrders.forEach(function(o){
      const key=branchName+'|'+(o.txnId||String(o.timestamp));
      if(!_knownTxns.has(key)){_knownTxns.add(key);newCount++;}
    });
    if(newCount>0 && (currentBranch==='ALL'||currentBranch===branchName)){
      playChime();
      toast('🍜 '+(newCount===1?'New '+branchName+' order!':newCount+' new '+branchName+' orders!'));
    }
  }else{
    fbOrders.forEach(function(o){_knownTxns.add(branchName+'|'+(o.txnId||String(o.timestamp)));});
  }
  // Tag this branch's rows and store them
  let rows=[];
  fbOrders.forEach(function(o){
    const r=fbOrderToRows(o);
    r.forEach(function(row){ row.branch=branchName; });
    rows=rows.concat(r);
  });
  window._liveByBranch[branchName]=rows;
  // Rebuild the merged liveRows from all branches
  liveRows=[];
  Object.keys(window._liveByBranch).forEach(function(b){
    liveRows=liveRows.concat(window._liveByBranch[b]);
  });
  liveReady=true;
  // After first batch of snapshots, allow chimes
  if(_firstSnap) setTimeout(function(){_firstSnap=false;}, 4000);
  // Live-update the Today tab if showing today
  if(currentTab==='today'&&selectedDate===today()&&currentBranch==='ALL')renderAllBranches();
  else if(currentTab==='today'&&selectedDate===today())renderToday();
  if(currentTab==='items')renderItems();
};

function branchDaily(){
  // Daily summary filtered by branch. data.json's dailySummary is per-branch
  // when tagged; if not tagged, fall back to deriving from rawRows.
  if(currentBranch==='ALL') return dailySummary;
  // Derive per-branch daily revenue/orders from rawRows (branch-tagged)
  const byDate={};
  branchRows(rawRows).forEach(function(r){
    const d=r.date; if(!d) return;
    if(!byDate[d]) byDate[d]={date:d,revenue:0,orders:0,cash:0,gcash:0,_seen:{}};
    const onum=String(r.orderNum||'');
    if(!byDate[d]._seen[onum]){
      byDate[d]._seen[onum]=true;
      const tot=parseFloat(r.order_total)||0;
      byDate[d].revenue+=tot; byDate[d].orders+=1;
      if((r.payment||'').toLowerCase()==='gcash') byDate[d].gcash+=tot; else byDate[d].cash+=tot;
    }
  });
  return Object.values(byDate);
}

function pieSVG(rows){

  }).join('')+'</div>';
}

function mergedTodayRows(){
  // MERGE live Firebase rows with today's Sheets rows, deduped by txn,
  // filtered to the selected branch. Order numbers can repeat across
  // branches, so the no-txn fallback key is branch-scoped.
  const sheetRows=branchRows(rawRows.filter(r=>r.date===today()));
  const live=branchRows(liveRows);
  if(!liveReady||!live.length) return sheetRows;
  const liveTxns=new Set(live.map(r=>r.txn).filter(Boolean));
  const liveNums=new Set(live.map(r=>String(r.branch||'UB')+'|'+String(r.orderNum)));
  const keep=sheetRows.filter(function(r){
    const t=r.txn||r.txnId;
    if(t&&liveTxns.has(String(t))) return false;
    if(!t&&liveNums.has(String(r.branch||'UB')+'|'+String(r.orderNum))) return false;
    return true;
  });
  return keep.concat(live);
}

function getBranchTodayRows(branch){
  const sheetRows = rawRows.filter(r=>r.date===today() && String(r.branch||'UB')===branch);
  const live = (window._liveByBranch[branch]||[]);
  if(!live.length) return sheetRows;
  const liveTxns = new Set(live.map(r=>r.txn).filter(Boolean));
  const keep = sheetRows.filter(r=>{ const t=r.txn||r.txnId; return !(t&&liveTxns.has(String(t))); });
  return keep.concat(live);
}

function getOrdersMultiBranch(rows){
  // Like getOrders but uses branch+txn as key to avoid cross-branch TXN collisions
  const o={};
  rows.forEach(r=>{
    const branch=String(r.branch||'UB');
    const txn=r.txn||String(r.orderNum||'').replace('#','').trim()||'unknown';
    const k=branch+'|'+txn;
    if(!o[k])o[k]={total:0,payment:r.payment||'Cash',time:r.timeCreated||r.time||'',branch};
    const t=parseFloat(r.order_total)||0;if(t>0)o[k].total=t;
    if(r.payment)o[k].payment=r.payment;
  });
  return Object.values(o);
}

  const allDays=DS.length||1;
  if(todayOrders.length>0){const diff=todayRev-weekDailyAvg;const pct=weekDailyAvg>0?Math.abs(diff/weekDailyAvg*100).toFixed(0):0;if(diff>0)insights.push({icon:'📈',title:`Today is ${pct}% above your daily average`,desc:`Today: ₱${fmt(todayRev.toFixed(0))} vs avg ₱${fmt(weekDailyAvg.toFixed(0))}`,badge:'badge-green',badgeText:'Above Average'});else insights.push({icon:'📉',title:`Today is ${pct}% below your daily average`,desc:`Today: ₱${fmt(todayRev.toFixed(0))} vs avg ₱${fmt(weekDailyAvg.toFixed(0))}`,badge:'badge-yellow',badgeText:'Below Average'});}
  insights.push({icon:'🏪',title:`₱${fmt(allRev.toFixed(0))} total revenue all time`,desc:`${allOrders} orders across ${allDays} days. Daily avg: ₱${fmt((allRev/allDays).toFixed(0))}`,badge:'badge-blue',badgeText:'All Time'});
  if(currentBranch==='ALL'&&itemSummary.length>0){const top=itemSummary[0];insights.push({icon:'⭐',title:`${top.item} is your #1 all-time seller`,desc:`Sold ${top.totalQty}x for ₱${fmt(top.totalRevenue.toFixed(0))} total.`,badge:'badge-green',badgeText:'Best Seller'});}
  if(currentBranch==='ALL'&&categorySummary.length>0){const top=categorySummary[0];const totalRev=categorySummary.reduce((s,c)=>s+c.totalRevenue,0);const pct=(top.totalRevenue/totalRev*100).toFixed(0);insights.push({icon:'🗂️',title:`${top.category} drives ${pct}% of all revenue`,desc:`₱${fmt(top.totalRevenue.toFixed(0))} from ${top.totalQty} items sold.`,badge:'badge-green',badgeText:'Top Category'});}
  const monthItems=getItemsFromRows(branchRows(rawRows.filter(r=>getDays(30).includes(r.date))),50);
  if(monthItems.length>0){const avgQty=monthItems.reduce((s,i)=>s+i.qty,0)/monthItems.length;const avgRev=monthItems.reduce((s,i)=>s+i.rev,0)/monthItems.length;const stars=monthItems.filter(i=>i.qty>=avgQty&&i.rev>=avgRev);if(stars.length)insights.push({icon:'⭐',title:`${stars[0].name} is a Star this month`,desc:`High sales (${stars[0].qty}x) AND high revenue (₱${fmt(stars[0].rev.toFixed(0))})`,badge:'badge-yellow',badgeText:'Star Product'});}
  const hmap={};for(let h=6;h<=22;h++)hmap[h]=0;
  weekRows.forEach(r=>{const h=getHourFromRow(r);if(h>=6&&h<=22)hmap[h]+=getAmtFromRow(r);});
  const peakH=Object.entries(hmap).sort((a,b)=>b[1]-a[1])[0];
  if(peakH&&peakH[1]>0){const h=Number(peakH[0]);insights.push({icon:'🕐',title:`Peak hour: ${h%12||12}${h<12?'AM':'PM'}`,desc:`Busiest hour this week with ₱${fmt(peakH[1].toFixed(0))} in sales.`,badge:'badge-yellow',badgeText:'Peak Hour'});}
  if(!insights.length){document.getElementById('insights-body').innerHTML='<div class="empty">Not enough data yet.</div>';return;}
  document.getElementById('insights-body').innerHTML=`<div class="card"><div class="card-hd"><span class="card-title">💡 Business Insights</span><span class="card-sub">Auto-generated</span></div><div>${insights.map(ins=>`<div class="insight-item"><div class="insight-icon">${ins.icon}</div><div class="insight-text"><div class="insight-title">${ins.title}</div><div class="insight-desc">${ins.desc}</div><span class="insight-badge ${ins.badge}">${ins.badgeText}</span></div></div>`).join('')}</div></div>`;
}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
document.getElementById('date-picker').value=selectedDate;
updateSoundBtn();
// Show all-body panel by default (ALL branch selected)
document.getElementById('tab-all').classList.add('active');
document.getElementById('tab-today').classList.remove('active');
loadData();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
<script>
// ── MIDNIGHT WATCHDOG ──
// Pages left open across midnight keep stale "today" queries/filters.
// Reload automatically when the date changes (all data is persistent).
(function(){
  var _bootDay = new Date().toDateString();
  setInterval(function(){
    if (new Date().toDateString() !== _bootDay) location.reload();
  }, 60000);
})();
</script>
