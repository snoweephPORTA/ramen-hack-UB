<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Order Collation">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Order Collation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f0f0;color:#1a1a1a;font-size:13px;}

/* NAV */
.nav{background:#1a1a1a;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.nav-title{font-size:14px;font-weight:700;letter-spacing:.5px;margin-right:4px;}
input.date-in{padding:6px 8px;border-radius:4px;border:1px solid #555;background:#333;color:#fff;font-size:11px;width:105px;}
.nb{padding:6px 12px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.nb:hover{opacity:.82;}
.nb-green{background:#22c55e;color:#fff;}
.nb-red{background:#ef4444;color:#fff;}
.nb-gray{background:#555;color:#fff;}

/* CONTROL PANEL */
.panel{background:#fff;border-bottom:1px solid #ddd;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.panel-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.panel-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;min-width:70px;}
.pb{padding:7px 13px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.pb:hover{opacity:.85;transform:translateY(-1px);}
.pb-blue{background:#3b82f6;color:#fff;}
.pb-dark{background:#374151;color:#fff;}
.pb-teal{background:#0d9488;color:#fff;}
.pb-purple{background:#7c3aed;color:#fff;}
.pb-orange{background:#ea580c;color:#fff;}
.pb-sm{padding:5px 10px;font-size:10px;}

/* PAGE */
.page{padding:14px;max-width:860px;margin:0 auto;}

/* BRANCH TABS */
.branch-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.branch-tab{padding:10px 16px;border-radius:5px;border:2px solid #ccc;background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.branch-tab:hover{border-color:#888;}
.branch-tab.has-data{border-color:#22c55e;color:#16a34a;}
.branch-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.branch-tab.active.has-data{background:#22c55e;border-color:#22c55e;color:#fff;}

/* ZONE PANEL */
.zone-panel{background:#fff;border-radius:6px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px;}
.zone-panel-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.zone-block{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f0f0;}
.zone-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.zone-name{font-size:11px;font-weight:700;color:#1a1a1a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;padding:3px 8px;background:#f5f5f5;border-left:3px solid #1a1a1a;border-radius:0 3px 3px 0;}
.items-area{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.item-row{display:flex;align-items:center;gap:5px;}
.item-name-d{flex:1;font-size:11px;padding:4px 7px;background:#f9f9f9;border:1px solid #e5e5e5;border-radius:3px;}
.item-qty-d{font-size:10px;padding:4px 7px;background:#fef9c3;border:1px solid #fde047;border-radius:3px;width:50px;text-align:center;font-weight:600;}
.item-del{padding:4px 8px;background:#fee2e2;border:1px solid #fca5a5;border-radius:3px;font-size:10px;color:#dc2626;cursor:pointer;font-weight:700;}
.item-del:hover{background:#ef4444;color:#fff;border-color:#ef4444;}
.add-row{display:flex;gap:5px;align-items:stretch;}
.add-wrap{flex:1;position:relative;}
.add-input{width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:4px;font-size:11px;font-family:inherit;outline:none;transition:border-color .15s;}
.add-input:focus{border-color:#1a1a1a;box-shadow:0 0 0 2px rgba(26,26,26,.08);}
.add-qty{width:52px;padding:7px;border:1px solid #ccc;border-radius:4px;font-size:11px;text-align:center;outline:none;}
.add-qty:focus{border-color:#1a1a1a;}
.add-btn{padding:7px 12px;background:#1a1a1a;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;}
.add-btn:hover{background:#333;}

/* AUTOCOMPLETE */
.ac-box{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 4px 4px;max-height:150px;overflow-y:auto;z-index:500;box-shadow:0 4px 10px rgba(0,0,0,.1);}
.ac-box div{padding:8px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid #f5f5f5;}
.ac-box div:hover{background:#f0f0f0;font-weight:600;}
.ac-box div:last-child{border-bottom:none;}

/* PREVIEW OUTPUT */
#outputArea{display:none;background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
#outputArea.show{display:block;}
#outputContent{background:white;padding:10px;transform-origin:top left;}

/* MODALS */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:8px;padding:22px;max-width:460px;width:94%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.modal h3{font-size:16px;margin-bottom:14px;}
.modal p{font-size:12px;color:#666;margin-bottom:14px;}
.modal-input{width:100%;padding:9px;border:1px solid #ccc;border-radius:4px;font-size:12px;margin-bottom:9px;font-family:inherit;outline:none;}
.modal-input:focus{border-color:#1a1a1a;}
.modal-btn-row{display:flex;gap:8px;margin-top:14px;}
.modal-btn-row button{flex:1;padding:10px;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;}
.manage-list{list-style:none;margin-top:10px;}
.manage-list li{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid #eee;border-radius:4px;margin-bottom:5px;font-size:12px;}
.manage-list li button{padding:4px 9px;background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;border-radius:3px;font-size:10px;cursor:pointer;font-weight:700;}

/* ── A4 PRINT STYLES (used in hidden divs) ── */
.a4-wrap{font-family:Arial,sans-serif;background:white;width:100%;padding:12px 16px;}
.a4-header{text-align:center;font-size:12px;font-weight:700;padding-bottom:6px;border-bottom:2px solid #000;margin-bottom:10px;}
.a4-grid{width:100%;border-collapse:collapse;table-layout:fixed;font-size:6.5px;}
.a4-grid th,.a4-grid td{border:1px solid #000;padding:2px 3px;vertical-align:top;word-wrap:break-word;overflow-wrap:break-word;}
.a4-grid th{background:#f0f0f0;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.a4-grid td{line-height:1.25;}
.a4-grid .zc{font-weight:700;background:#f0f0f0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.row-abanao td,.row-abanao .zc{background:#ffff00!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.row-porta td,.row-porta .zc{background:#92d050!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.a4-mkt-title{font-size:10px;font-weight:700;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px;}
.a4-sup-name{font-size:8px;font-weight:700;background:#f0f0f0;padding:3px 5px;border:1px solid #000;margin-bottom:2px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.a4-sup-table{width:100%;border-collapse:collapse;font-size:6.5px;margin-bottom:10px;table-layout:fixed;}
.a4-sup-table th,.a4-sup-table td{border:1px solid #000;padding:2px 4px;text-align:center;}
.a4-sup-table th{background:#f0f0f0;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.a4-sup-table td:first-child{text-align:left;}
.a4-total{font-weight:700;}
.a4-none{color:#999;}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <span class="nav-title">ORDER COLLATION</span>
  <input type="date" id="dateIn" class="date-in">
  <button class="nb nb-green" onclick="startSession()">Start</button>
  <button class="nb nb-red"   onclick="endSession()">End</button>
  <button class="nb nb-gray"  onclick="openRestore()">Restore</button>
</div>

<!-- CONTROL PANEL -->
<div class="panel">
  <div class="panel-row">
    <span class="panel-label">Preview</span>
    <button class="pb pb-blue pb-sm"   onclick="previewGrid()">Grid</button>
    <button class="pb pb-teal pb-sm"   onclick="previewSummary()">Summary</button>
    <button class="pb pb-purple pb-sm" onclick="previewCombined()">Combined</button>
  </div>
  <div class="panel-row">
    <span class="panel-label">JPEG</span>
    <button class="pb pb-dark pb-sm"   onclick="exportJPEG('grid')">Grid</button>
    <button class="pb pb-dark pb-sm"   onclick="exportJPEG('summary')">Summary</button>
    <button class="pb pb-dark pb-sm"   onclick="exportJPEG('combined')">Combined</button>
  </div>

  <div class="panel-row">
    <span class="panel-label">Settings</span>
    <button class="pb pb-gray pb-sm" style="background:#6b7280;" onclick="openManageZones()">Zones</button>
    <button class="pb pb-gray pb-sm" style="background:#6b7280;" onclick="openManageBranches()">Branches</button>
    <button class="pb pb-gray pb-sm" style="background:#6b7280;" onclick="openManageSuppliers()">Suppliers</button>
    <button class="pb pb-gray pb-sm" style="background:#6b7280;" onclick="openItemManager()">Items</button>
  </div>
</div>

<!-- PAGE -->
<div class="page">
  <div class="branch-row" id="branchTabs"></div>
  <div class="zone-panel" id="zonePanel" style="display:none;">
    <div class="zone-panel-title" id="zonePanelTitle"></div>
    <div id="zoneBlocks"></div>
  </div>
  <div id="outputArea"><div id="outputContent"></div></div>
</div>

<!-- HIDDEN A4 RENDER DIVS -->
<div id="a4Grid"     style="position:absolute;top:-9999px;left:0;visibility:hidden;"></div>
<div id="a4Summary"  style="position:absolute;top:-9999px;left:0;visibility:hidden;"></div>
<div id="a4Combined" style="position:absolute;top:-9999px;left:0;visibility:hidden;"></div>

<!-- MODALS -->
<div class="modal-bg" id="modalEnd">
  <div class="modal">
    <h3>End Session?</h3>
    <p>Data will be backed up. You can restore anytime.</p>
    <div class="modal-btn-row">
      <button style="background:#22c55e;color:#fff;" onclick="confirmEnd()">Yes, End</button>
      <button style="background:#eee;color:#333;" onclick="closeModal('modalEnd')">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalRestore">
  <div class="modal">
    <h3>Restore Session</h3>
    <div id="restoreList"></div>
    <div class="modal-btn-row">
      <button style="background:#eee;color:#333;" onclick="closeModal('modalRestore')">Close</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalZones">
  <div class="modal">
    <h3>Manage Zones</h3>
    <input class="modal-input" id="newZoneInput" placeholder="Zone name">
    <button style="width:100%;padding:9px;background:#22c55e;color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:12px;" onclick="addZone()">Add Zone</button>
    <ul class="manage-list" id="zoneManageList"></ul>
    <div class="modal-btn-row"><button style="background:#eee;color:#333;" onclick="closeModal('modalZones')">Close</button></div>
  </div>
</div>

<div class="modal-bg" id="modalBranches">
  <div class="modal">
    <h3>Manage Branches</h3>
    <input class="modal-input" id="newBranchInput" placeholder="Branch name">
    <button style="width:100%;padding:9px;background:#22c55e;color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:12px;" onclick="addBranch()">Add Branch</button>
    <ul class="manage-list" id="branchManageList"></ul>
    <div class="modal-btn-row"><button style="background:#eee;color:#333;" onclick="closeModal('modalBranches')">Close</button></div>
  </div>
</div>

<div class="modal-bg" id="modalItems">
  <div class="modal">
    <h3>Item Library</h3>
    <div id="itemLibraryContent" style="font-size:11px;max-height:400px;overflow-y:auto;"></div>
    <div class="modal-btn-row"><button style="background:#eee;color:#333;" onclick="closeModal('modalItems')">Close</button></div>
  </div>
</div>

<div class="modal-bg" id="modalSuppliers">
  <div class="modal">
    <h3>Manage Suppliers</h3>
    <input class="modal-input" id="newSupplierInput" placeholder="Supplier name">
    <button style="width:100%;padding:9px;background:#22c55e;color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:12px;" onclick="addSupplier()">Add Supplier</button>
    <ul class="manage-list" id="supplierManageList"></ul>
    <div class="modal-btn-row"><button style="background:#eee;color:#333;" onclick="closeModal('modalSuppliers')">Close</button></div>
  </div>
</div>

<script>
// ── DATA ──
const MASTER_ITEMS = ["Kimchi Rice Sauce","Red Sauce","Brown Sauce","Cheese Sauce","Samjang","Kimchi","Gyoza","Sharks Fin","Tteokbokki","Sliced Cheese","Enoki","Fish Cake","conatiner straw","container spoon ice cream","Spam","Glutinous Rice","Seaweed Wrap","Raddish","Sesame Seeds","Mayonnaise","Soy Sauce Packet","Sugar Syup","vinegar","Basahan","Soy Sauce","Brown Sugar","Fried Garlic","mask","Bigas","Oil in Can","Coke","Water 500","Gimmari","Japchae Noodles","Fresh Garlic","seafood ball","Cream cheese snowee","alcohol","Drink cups","Drink Cover","Rice Bowl 520cc","Rice Bowl cover","Samgyup Bowl 750cc","Samgyup Bowl cover","Ramen Bowl","steel wool","ice cream mixture","Peeler","Ramen Cover","coffee filter","Tteokbokki cups 220cc","Mandu Cups 12oz","Spag box","Gravy cups","Paper Bag Large 20","Paper Bag Small 10","Plastic Labo 8x13","stainless container","Waffle oil","Coffee grounds","Plastic Labo 10x15","Floor rug","Sando Bag Med","Tissue","Fruit Fork Bamboo","Mandu Stick 6\"","Straw","Spoon","Fork","Chopstick","Soup Spoon","gloves","Thermal paper","Tape","520cc cover","750cc cover","Ketchup","Oyster sauce","Nori","Jin Mild","Jin Spicy","Shin Red","Shin Toomba","Cheese Mild","Cheese Spicy","Cheese Stir Fry","Neogori","Buldak Pink","Buldak Yellow","Buldak Quatro","Chapaghetti Mild","Chapaghetti Spicy","PC Orig","PC Sweet & Spicy","PC Extra Hot","PC Calamansi","PC Chilimansi","Sando Bag S","salt","gasul","det. Powder","Garbage Bg L","Garbage Bg XL","sponge","garlic chopper","zonrox","Gloves Rubber Long","dishwashing","Pork","Beef","Mandu","Milk","Coffee","Matcha","Mango","Chocolate","Strawberry","Ube","Fish Tofu","Lobster Balls","Cheese Balls","Togue","Leeks","Carrot","Pipino","Peeled Garlic","Crabstick","Fries","Ramen Signature","Sesame oil","Pork Samgyup","Beef Samgyup","Pork Toppings","Kimbap","Egg","Beef Toppings","Disinfectant","Tongs Nonstick","ice scooper","bingsu strawberry","Pot Holder","ice box","Tubig refill","Coffee cup 8oz","Gloves box vnl","ecobag","Waffle Bag","banana","waffle mixture","Choco Snowee","Biscoff Snowee","White Choco Snowee","Matcha Snowee","Waffle Paper","Milk Snowee","Cheese Snowee","Stove","Bingsu Mixture","Bingsu Milk Toppings","Bingsu Mango","Snowee All Toppings","Creamer","Ham","Tuna","8 oz cups","Corned beef","Snowee blueberry","Milk Shake CUPS","Milk shake mixture","milk shake mango","milk shake choco","Mshake Dome Lid","Snowee Mshake cup","Sugar packet","Choco POWDER MS","Strawb POWDER MS","Matcha POWDER MS","Mango POWDER MS","Paper Bag 20","Paper Bag 10","20 10 5 1","20 10 1","20 10 5","5 1","10 5 1","20 10","20 5","20 1","10 5","10 1","20","10","5","1"];

let S = {
  date: new Date().toISOString().split('T')[0],
  branches: ['Abanao','Porta','UB','Melted','Snowee'],
  zones: ['Camp7','Heavy Items','Packaging','Noodles','Shobe','Market','Abanao','Porta','Coins'],
  data: {},
  suppliers: {},
  supplierList: ['Golden Lion','Tagalog Market','Grocery','Others'],
  backups: [],
  activeBranch: null,
  itemList: [...MASTER_ITEMS]
};

function save(){ localStorage.setItem('ocs_v4', JSON.stringify(S)); }
function load(){
  const raw = localStorage.getItem('ocs_v4');
  if(raw){ const l=JSON.parse(raw); S={...S,...l}; }
  if(!S.supplierList || !S.supplierList.length) S.supplierList=['Golden Lion','Tagalog Market','Grocery','Others'];
  ensureData();
  document.getElementById('dateIn').value = S.date;
  renderBranchTabs();
}
function ensureData(){
  S.branches.forEach(b=>{
    if(!S.data[b]) S.data[b]={};
    S.zones.forEach(z=>{ if(!S.data[b][z]) S.data[b][z]=[]; });
  });
}

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ── SESSION ──
function startSession(){
  if(!confirm('Start new session? Current data will be cleared.')) return;
  S.date = document.getElementById('dateIn').value || new Date().toISOString().split('T')[0];
  S.data={}; ensureData(); S.activeBranch=null;
  save(); renderBranchTabs();
  document.getElementById('zonePanel').style.display='none';
  document.getElementById('outputArea').classList.remove('show');
}
function endSession(){ document.getElementById('modalEnd').classList.add('open'); }
function confirmEnd(){
  S.backups.unshift({date:S.date,data:JSON.parse(JSON.stringify(S.data)),time:new Date().toLocaleString()});
  if(S.backups.length>3) S.backups.pop();
  S.data={}; ensureData(); S.activeBranch=null;
  save(); closeModal('modalEnd'); renderBranchTabs();
  document.getElementById('zonePanel').style.display='none';
  document.getElementById('outputArea').classList.remove('show');
  alert('Session ended. Data backed up.');
}
function openRestore(){
  const el=document.getElementById('restoreList');
  if(!S.backups.length){ el.innerHTML='<p style="color:#999;font-size:12px;">No backups available.</p>'; }
  else{
    el.innerHTML=S.backups.map((b,i)=>`
      <div style="border:1px solid #eee;border-radius:5px;padding:10px;margin-bottom:8px;">
        <div style="font-weight:700;margin-bottom:3px;font-size:12px;">${b.time}</div>
        <div style="color:#777;margin-bottom:8px;font-size:11px;">${fmtDate(b.date)}</div>
        <button onclick="doRestore(${i})" style="width:100%;padding:8px;background:#22c55e;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;">Restore</button>
      </div>`).join('');
  }
  document.getElementById('modalRestore').classList.add('open');
}
function doRestore(i){
  if(!confirm('Restore?')) return;
  const b=S.backups[i];
  S.date=b.date; S.data=JSON.parse(JSON.stringify(b.data)); ensureData();
  document.getElementById('dateIn').value=S.date;
  save(); closeModal('modalRestore'); renderBranchTabs();
  document.getElementById('zonePanel').style.display='none';
  alert('Restored!');
}

// ── BRANCHES ──
function renderBranchTabs(){
  document.getElementById('branchTabs').innerHTML=S.branches.map(b=>{
    const has=S.zones.some(z=>(S.data[b]?.[z]?.length>0));
    const act=b===S.activeBranch;
    return `<div class="branch-tab${has?' has-data':''}${act?' active':''}" onclick="selectBranch('${b}')">${b}</div>`;
  }).join('');
}
function selectBranch(b){
  S.activeBranch=b; renderBranchTabs(); renderZonePanel();
  document.getElementById('zonePanel').style.display='block';
  document.getElementById('zonePanelTitle').textContent='Branch: '+b;
}

// ── ZONE PANEL ──
function renderZonePanel(){
  const b=S.activeBranch;
  const el=document.getElementById('zoneBlocks');
  el.innerHTML='';
  S.zones.forEach(z=>{
    const items=S.data[b][z]||[];
    const block=document.createElement('div');
    block.className='zone-block';
    const title=document.createElement('div');
    title.className='zone-name'; title.textContent=z;
    block.appendChild(title);
    const area=document.createElement('div');
    area.className='items-area';
    items.forEach((item,idx)=>{ area.appendChild(makeItemRow(z,idx,item)); });
    block.appendChild(area);
    block.appendChild(makeAddRow(z));
    el.appendChild(block);
  });
}
function makeItemRow(zone,idx,item){
  const row=document.createElement('div'); row.className='item-row';
  const name=document.createElement('div'); name.className='item-name-d'; name.textContent=item.name;
  const qty=document.createElement('div'); qty.className='item-qty-d'; qty.textContent=item.qty||'-';
  const del=document.createElement('button'); del.className='item-del'; del.textContent='✕';
  del.onclick=()=>{ S.data[S.activeBranch][zone].splice(idx,1); save(); renderZonePanel(); };
  row.appendChild(name); row.appendChild(qty);
  if(zone==='Market' && item.supplier){
    const sup=document.createElement('div');
    sup.style.cssText='font-size:9px;padding:4px 6px;background:#dbeafe;border:1px solid #93c5fd;border-radius:3px;color:#1d4ed8;white-space:nowrap;';
    sup.textContent=item.supplier;
    row.appendChild(sup);
  }
  row.appendChild(del);
  return row;
}
function makeAddRow(zone){
  const isMarket = zone === 'Market';
  const row=document.createElement('div'); row.className='add-row'; row.style.flexWrap='wrap'; row.style.gap='5px';
  const wrap=document.createElement('div'); wrap.className='add-wrap'; wrap.style.flex='1'; wrap.style.minWidth='120px';
  const input=document.createElement('input'); input.type='text'; input.className='add-input'; input.placeholder='Type item...';
  const qty=document.createElement('input'); qty.type='text'; qty.className='add-qty'; qty.placeholder='Qty';

  // Supplier dropdown - only for Market
  let supplierSel = null;
  if(isMarket){
    supplierSel = document.createElement('select');
    supplierSel.style.cssText='padding:7px 6px;border:1px solid #ccc;border-radius:4px;font-size:11px;background:white;color:#1a1a1a;flex:1;min-width:100px;';
    supplierSel.innerHTML = '<option value="">Supplier...</option>' +
      S.supplierList.map(s=>`<option value="${s}">${s}</option>`).join('');
  }

  const btn=document.createElement('button'); btn.className='add-btn'; btn.textContent='+ Add';
  let ac=null;
  function showAC(){
    if(ac) ac.remove();
    const q=input.value.trim().toLowerCase();
    if(!q) return;
    const matches=S.itemList.filter(x=>x.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length) return;
    ac=document.createElement('div'); ac.className='ac-box';
    matches.forEach(m=>{ const d=document.createElement('div'); d.textContent=m; d.onmousedown=e=>{ e.preventDefault(); input.value=m; ac.remove(); ac=null; if(supplierSel) supplierSel.focus(); else qty.focus(); }; ac.appendChild(d); });
    wrap.appendChild(ac);
  }
  function addItem(){
    const name=input.value.trim();
    if(!name) return;
    const q=qty.value.trim();
    const sup = supplierSel ? supplierSel.value : '';
    const itemObj = {name, qty:q};
    if(isMarket && sup) itemObj.supplier = sup;
    S.data[S.activeBranch][zone].push(itemObj);
    if(!S.itemList.includes(name)) S.itemList.push(name);
    // Remember supplier for this item
    if(isMarket && sup) S.suppliers[name] = sup;
    input.value=''; qty.value='';
    if(supplierSel) supplierSel.value='';
    save(); renderZonePanel();
    setTimeout(()=>{ const inp=document.querySelector(`.add-input[data-zone="${zone}"]`); if(inp) inp.focus(); },50);
  }
  input.setAttribute('data-zone',zone);
  input.addEventListener('input',showAC);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addItem();} if(e.key==='Escape'&&ac){ac.remove();ac=null;} });
  input.addEventListener('blur',()=>{ setTimeout(()=>{ if(ac){ac.remove();ac=null;}},200); });
  qty.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addItem();} });
  btn.onclick=addItem;
  wrap.appendChild(input); row.appendChild(wrap); row.appendChild(qty);
  if(supplierSel) row.appendChild(supplierSel);
  row.appendChild(btn);
  return row;
}

// ── BUILD A4 HTML ──
function buildA4Grid(){
  const d=S.date||new Date().toISOString().split('T')[0];
  const zW=14; const bW=((100-zW)/S.branches.length).toFixed(1);
  let h=`<div class="a4-wrap">`;
  h+=`<div class="a4-header">${fmtDate(d)}</div>`;
  h+=`<table class="a4-grid"><thead><tr><th class="zc" style="width:${zW}%;">ZONE</th>`;
  S.branches.forEach(b=>h+=`<th style="width:${bW}%;">${b.toUpperCase()}</th>`);
  h+=`</tr></thead><tbody>`;
  S.zones.forEach(z=>{
    const zL=z.toLowerCase();
    let rc='';
    if(zL==='abanao') rc=' row-abanao';
    else if(zL==='porta') rc=' row-porta';
    h+=`<tr class="${rc}"><td class="zc">${z}</td>`;
    S.branches.forEach(b=>{
      const items=S.data[b]?.[z]||[];
      if(!items.length){ h+=`<td style="color:#999;">-</td>`; }
      else{
        h+=`<td>`;
        items.forEach(it=>{ h+=`<div>${it.name}${it.qty?` (${it.qty})`:''}</div>`; });
        h+=`</td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function buildA4Summary(){
  const d=S.date||new Date().toISOString().split('T')[0];
  const marketRaw={};
  S.branches.forEach(b=>{
    (S.data[b]?.['Market']||[]).forEach(it=>{
      if(!it.name||!it.name.trim()) return;
      if(!marketRaw[it.name]) marketRaw[it.name]={};
      marketRaw[it.name][b]=it.qty||'';
    });
  });
  let h=`<div class="a4-wrap">`;
  h+=`<div class="a4-header">${fmtDate(d)}</div>`;
  h+=`<div class="a4-mkt-title">MARKET SUMMARY</div>`;
  if(!Object.keys(marketRaw).length){
    h+=`<p style="font-size:10px;color:#999;">No market items.</p></div>`;
    return h;
  }
  const bySupplier={};
  Object.entries(marketRaw).forEach(([item,bq])=>{
    const sup=S.suppliers[item]||'Unassigned';
    if(!bySupplier[sup]) bySupplier[sup]={};
    bySupplier[sup][item]=bq;
  });
  Object.entries(bySupplier).forEach(([sup,items])=>{
    h+=`<div class="a4-sup-name">${sup}</div>`;
    h+=`<table class="a4-sup-table"><thead><tr><th style="width:40%;text-align:left;">ITEM</th><th style="width:10%;">TOTAL</th>`;
    S.branches.forEach(b=>h+=`<th>${b}</th>`);
    h+=`</tr></thead><tbody>`;
    Object.entries(items).forEach(([item,bq])=>{
      let total=0,hasNum=false;
      S.branches.forEach(b=>{const q=parseFloat(bq[b]);if(!isNaN(q)){total+=q;hasNum=true;}});
      h+=`<tr><td>${item}</td><td class="a4-total">${hasNum?total:'-'}</td>`;
      S.branches.forEach(b=>{const q=bq[b];h+=`<td class="${q?'':'a4-none'}">${q||'-'}</td>`;});
      h+=`</tr>`;
    });
    h+=`</tbody></table>`;
  });
  h+=`</div>`;
  return h;
}

function buildA4Combined(){
  const d=S.date||new Date().toISOString().split('T')[0];
  return buildA4Grid().replace('</div>','') + 
    `<div style="margin-top:16px;">` + 
    buildA4Summary().replace('<div class="a4-wrap">','').replace(`<div class="a4-header">${fmtDate(d)}</div>`,'') + 
    `</div>`;
}

// ── PREVIEW ──
function scaleToFit(){
  const el = document.getElementById('outputContent');
  const container = document.getElementById('outputArea');
  // Reset scale first to get natural width
  el.style.transform = 'none';
  el.style.width = '';
  setTimeout(()=>{
    const naturalW = el.scrollWidth;
    const availW = container.clientWidth - 20;
    if(naturalW > availW){
      const scale = availW / naturalW;
      el.style.transform = `scale(${scale})`;
      el.style.transformOrigin = 'top left';
      el.style.width = naturalW + 'px';
      container.style.height = (el.scrollHeight * scale + 20) + 'px';
    } else {
      container.style.height = '';
    }
  }, 50);
}

function previewGrid(){
  document.getElementById('outputContent').innerHTML = buildA4Grid();
  document.getElementById('outputArea').classList.add('show');
  scaleToFit();
  document.getElementById('outputArea').scrollIntoView({behavior:'smooth'});
}

// ── CAPTURE TO PDF ──
function captureAndPDF(html, filename){
  const wrap = document.getElementById('a4Grid');
  // Force exact A4 portrait width at 96dpi = 794px
  wrap.style.cssText = 'position:absolute;top:-9999px;left:0;width:794px;background:white;visibility:visible;';
  wrap.innerHTML = html;

  setTimeout(()=>{
    html2canvas(wrap, {
      scale: 2,
      backgroundColor: '#fff',
      useCORS: true,
      logging: false,
      width: 794,
      windowWidth: 794
    }).then(canvas=>{
      wrap.style.visibility='hidden';
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const pw=210, ph=297, mg=6;
      const uw=pw-mg*2, uh=ph-mg*2;
      const pxPerMm = canvas.width / uw;
      const pxPerPage = uh * pxPerMm;
      let y=0, pg=0;
      while(y < canvas.height){
        if(pg>0) pdf.addPage();
        const sh = Math.min(pxPerPage, canvas.height-y);
        const sc = document.createElement('canvas');
        sc.width = canvas.width; sc.height = sh;
        const ctx = sc.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,sc.width,sh);
        ctx.drawImage(canvas, 0,y, canvas.width,sh, 0,0, canvas.width,sh);
        pdf.addImage(sc.toDataURL('image/jpeg',0.99),'JPEG', mg,mg, uw, sh/pxPerMm);
        y += pxPerPage; pg++;
      }
      pdf.save(filename);
    });
  }, 300);
}

// ── SHARED PRINT STYLES ──
function getPrintStyles(){
  return `
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Arial,sans-serif;background:white;}
    @page{size:A4 portrait;margin:8mm;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
    .a4-wrap{font-family:Arial,sans-serif;background:white;width:100%;}
    .a4-header{text-align:center;font-size:13px;font-weight:700;padding-bottom:6px;border-bottom:2px solid #000;margin-bottom:10px;}
    .a4-grid{width:100%;border-collapse:collapse;table-layout:fixed;font-size:7px;}
    .a4-grid th,.a4-grid td{border:1px solid #000;padding:3px 4px;vertical-align:top;word-wrap:break-word;overflow-wrap:break-word;line-height:1.3;}
    .a4-grid th{background:#f0f0f0 !important;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .a4-grid .zc{font-weight:700;background:#f0f0f0 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .row-abanao td,.row-abanao .zc{background:#ffff00 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .row-porta td,.row-porta .zc{background:#92d050 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .a4-mkt-title{font-size:11px;font-weight:700;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px;}
    .a4-sup-name{font-size:9px;font-weight:700;background:#f0f0f0 !important;padding:3px 5px;border:1px solid #000;margin-bottom:2px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .a4-sup-table{width:100%;border-collapse:collapse;font-size:7px;margin-bottom:10px;table-layout:fixed;}
    .a4-sup-table th,.a4-sup-table td{border:1px solid #000;padding:3px 4px;text-align:center;}
    .a4-sup-table th{background:#f0f0f0 !important;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .a4-sup-table td:first-child{text-align:left;}
    .a4-total{font-weight:700;} .a4-none{color:#999;}
  `;
}

// ── JPEG: capture using hidden div at fixed width ──
function exportJPEG(type){
  let html, filename;
  if(type==='grid'){ html=buildA4Grid(); filename=`grid-${S.date}.jpg`; }
  else if(type==='summary'){ html=buildA4Summary(); filename=`summary-${S.date}.jpg`; }
  else { html=buildA4Grid()+'<div style="margin-top:20px;">'+buildA4Summary()+'</div>'; filename=`combined-${S.date}.jpg`; }

  const wrap = document.getElementById('a4Grid');
  wrap.style.cssText = 'position:absolute;top:-9999px;left:0;width:794px;background:white;visibility:visible;';
  wrap.innerHTML = html;

  setTimeout(()=>{
    html2canvas(wrap,{
      scale:2, backgroundColor:'#fff', useCORS:true, logging:false,
      width:794, windowWidth:794
    }).then(canvas=>{
      wrap.style.visibility='hidden';
      const a=document.createElement('a');
      a.href=canvas.toDataURL('image/jpeg',0.95);
      a.download=filename;
      a.click();
    });
  },300);
}

// ── PRINT ──
function doPrint(type){
  let html='';
  if(type==='grid') html=buildA4Grid();
  else if(type==='summary') html=buildA4Summary();
  else html=buildA4Grid()+'<div style="page-break-before:always;">'+buildA4Summary()+'</div>';
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><style>${getPrintStyles()}</style></head><body>${html}</body></html>`);
  win.document.close(); win.focus();
  setTimeout(()=>{win.print();win.close();},600);
}
